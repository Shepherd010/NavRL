algo:
  feature_extractor:
    learning_rate: 5e-4
    dyn_obs_num: 5
  
  actor:
    learning_rate: 5e-4
    clip_ratio: 0.1
    action_limit: 2.0 # m/s
  
  critic:
    learning_rate: 5e-4
    clip_ratio: 0.1
  
  entropy_loss_coefficient: 1e-3 # encourage exploration
  training_frame_num: 32
  training_epoch_num: 2  # 4→2: halves gradient-update time; 32768 diverse samples still sufficient
  num_minibatches: 8     # 16→8: doubles minibatch size (4096) for better GPU utilisation