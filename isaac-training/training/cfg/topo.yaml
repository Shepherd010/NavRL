# Topology-based navigation configuration
# Used by TopoExtractor, GraphTransformer, SafetyShieldQP, HierarchicalController
# NOTE: All keys are nested under `topo:` so they are accessible as cfg.topo.xxx

topo:
  # ----- TopoExtractor -----
  max_nodes: 40                  # reduced for lower O(N^2) attention cost, total N+1 = 25
  node_feat_dim: 18
  edge_feat_dim: 8                # 3(rel_pos)+1(elen)+1(dyn_dist)+3(dir)
  lidar_range: 10.0              # must match sensor.lidar_range in train.yaml
  grid_size: 100                 # 2D distance field grid resolution (100x100 -> 0.1m/cell)
  safe_radius: 0.4               # minimum clearance (m) for a valid Voronoi node
  grad_threshold: 0.5            # gradient magnitude threshold for local maxima detection
  nms_radius: 0.5                # non-maximum suppression radius (m)
  k_neighbors: 5                 # KNN for edge building
  max_edge_length: 2.0           # maximum edge length (m)
  use_topo: true                 # enable graph observation keys in env

  # ----- GraphTransformer -----
  hidden_dim: 48
  num_heads: 4                   # must divide hidden_dim evenly
  num_layers: 2
  dropout: 0.1
  # Complexity reduction switches
  use_topo_bias: false           # disable edge/spd bias MLPs (largest NxN cost outside QK)
  use_spd_bias: true            # disable Floyd-Warshall + SPD bias
  sparse_topk: 8                # sparse attention per query node: O(N*K), K<<N
  value_chunk_size: 1024         # shift-trick reduces next_values to 1 forward pass (1024 samples) — fits in one chunk

  # ----- node_to_velocity -----
  v_target: 5.0                  # cruise speed (m/s)
  min_dist: 0.1                  # minimum distance to avoid div-by-zero

  # ----- SafetyShieldQP -----
  qp_relaxation_weight: 5000.0   # lambda: penalty on slack variables
  qp_max_relaxation: 0.3         # delta_max: max constraint violation allowed (m/s)
  qp_v_max: 5.0                  # velocity bound (m/s), should match v_target
  qp_safe_distance: 0.15         # CBF safe margin (m); minimal — QP is last-resort safety, not primary signal
  qp_cbf_alpha: 0.8              # CBF gain (lower = softer intervention)

  # ----- Reward shaping (graph_ppo mode) -----
  reward_intervention_weight: -0.5   # penalty per unit QP intervention ||v_safe - v_rl||
  reward_tracking_weight: -0.05      # small tracking penalty — don't over-constrain goal pursuit

  # ----- Training (graph_ppo mode) -----
  entropy_loss_coefficient: 0.02     # higher entropy → more exploration, avoids hovering fixed point

  # ----- HierarchicalController -----
  high_freq: 62.5                # simulation frequency (Hz)
  low_freq: 10.0                 # planning frequency (Hz)
  # freq_ratio = int(round(62.5 / 10.0)) = 6 (computed at runtime)
  pid_kp: 2.0
  pid_kd: 0.8
  pid_ki: 0.05
  goal_horizon: 0.5              # intermediate goal time horizon (s); 0.1 caused only 0.2m subgoal → 0.4m/s actual speed
  pid_integral_limit: 1.0        # anti-windup integral clamp (m*s)
