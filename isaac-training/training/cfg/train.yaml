defaults:
  - _self_
  - drone
  - ppo
  - sim
  - topo

headless: True
mode: graph_ppo  # ppo | graph_ppo
device: "cuda:0"
seed: 0

# Total Training Length
max_frame_num: 12e8 # max frame 
eval_interval: 200 # evaluate the policy for every N training steps
save_interval: 200
log_interval: 1    # log to wandb every N steps (reduces serialisation overhead)

# Training Environment
env:
  num_envs: 2 # Number of drones for training
  max_episode_length: 1000  # 2200→1000: 目标~30m, 2m/s需約4×150=600步; 短化提高episode多样性
  env_spacing: 8.0 
  num_obstacles: 350
  spawn_mode: interior_safe  # edge | interior_safe
  interior_spawn_num_patches: 512
  interior_spawn_patch_radius: 0.3
  interior_spawn_max_height_diff: 0.30

# Evaluation Environment (uses the same Isaac Sim env but only counts first N envs)
eval:
  num_envs: 2          # envs counted for stats (≤ env.num_envs, set lower to save VRAM)
  max_episode_length: 500  # shorter cap; exit early once all eval envs finish one episode

env_dyn:
  num_obstacles: 80 # set to zero if static env is needed
  vel_range: [0.5, 1.5]
  local_range: [5.0, 5.0, 4.5]

viewer:
  eye: [0., 40., 40.]
  lookat: [0., 2.5, 0.]
  resolution: [960, 720]

wandb:
  project: "isaac-training"
  name: navigation_training
  entity: shepherd010
  mode: online # offline
  run_id: #kw9xf9k9

# Visualization (V1 topo graph, V2 attention heatmaps, V3 reward bars)
# Only active for graph_ppo mode; uses matplotlib + PIL, no GPU needed.
viz:
  interval: 50   # log viz images to WandB every N training steps
